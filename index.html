<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genius Scanner 😎</title>

<link rel="stylesheet" href="style.css">

</head>
<body>


<!-- MAIN CARD -->

<div class="card" id="card">

<h1>🧠 Genius Level Scanner</h1>

<p class="text">
Aapko kya lgta hai aap Genius ho? 🤔
</p>

<input 
type="text" 
id="nameInput" 
placeholder="Enter your name Genius ji 😌"
>

<p class="note">
📌 If YES then click YES for next surprise 🎁
</p>

<div class="btnBox">

<button class="yesBtn" onclick="startScan()">
YES 😎
</button>

<button class="noBtn" id="noBtn">
NO 🤭
</button>

</div>

</div>



<!-- SCANNER CARD -->

<div class="card hidden" id="scanCard">

<h2 id="scanText">
Scanning Genius Level... 0%
</h2>

<div class="progressBox">

<div class="progress" id="progress"></div>

</div>

</div>



<!-- QR CARD -->

<div class="card hidden" id="qrCard">

<h2 id="resultText"></h2>

<a id="upiLink">

<img 
src="paytmQR.jpeg" 
class="qr"
>

</a>

<p class="payText">
Tap QR to pay Genius Tax 💸
</p>

</div>


<script src="script.js"></script>

</body>
</html>
